[Metadata]
Name=Matugen
Version=1
Author=matugen
Description=Material You generated theme — do not edit, regenerated on wallpaper change
ScaleWithDPI=True

[InputPanel]
NormalColor={{ colors.on_surface.default.hex }}
HighlightCandidateColor={{ colors.on_primary.default.hex }}
HighlightColor={{ colors.on_surface.default.hex }}
HighlightBackgroundColor={{ colors.primary.default.hex }}
PageButtonAlignment=Last Candidate

[InputPanel/TextMargin]
Left=8
Right=8
Top=6
Bottom=6

[InputPanel/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Background]
Color={{ colors.surface.default.hex }}
BorderColor={{ colors.primary.default.hex }}
BorderWidth=2

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color={{ colors.primary.default.hex }}

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[InputPanel/PrevPage]
Image=prev.png

[InputPanel/PrevPage/ClickMargin]
Left=5
Right=5
Top=4
Bottom=4

[InputPanel/NextPage]
Image=next.png

[InputPanel/NextPage/ClickMargin]
Left=5
Right=5
Top=4
Bottom=4

[Menu]
NormalColor={{ colors.on_surface.default.hex }}
HighlightCandidateColor={{ colors.on_primary.default.hex }}

[Menu/Background]
Color={{ colors.surface.default.hex }}
BorderColor={{ colors.primary.default.hex }}
BorderWidth=2

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/Highlight]
Color={{ colors.primary.default.hex }}

[Menu/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[Menu/Separator]
Color={{ colors.on_surface_variant.default.hex }}

[Menu/TextMargin]
Left=8
Right=8
Top=6
Bottom=6
