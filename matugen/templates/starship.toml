"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

[palettes.matugen]
color_fg0       = '{{ colors.on_surface.default.hex }}'
color_bg1       = '{{ colors.surface_container_lowest.default.hex }}'
color_bg3       = '{{ colors.surface_container_high.default.hex }}'
color_orange    = '{{ colors.tertiary.default.hex }}'
color_fg_orange = '{{ colors.on_tertiary.default.hex }}'
color_yellow    = '{{ colors.secondary.default.hex }}'
color_fg_yellow = '{{ colors.on_secondary.default.hex }}'
color_aqua      = '{{ colors.tertiary_container.default.hex }}'
color_fg_aqua   = '{{ colors.on_tertiary_container.default.hex }}'
color_blue      = '{{ colors.primary_container.default.hex }}'
color_fg_blue   = '{{ colors.on_primary_container.default.hex }}'
color_green     = '{{ colors.secondary.default.hex }}'
color_red       = '{{ colors.error.default.hex }}'
color_purple    = '{{ colors.secondary_container.default.hex }}'

[os]
disabled = false
style = "bg:color_orange fg:color_fg_orange"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg_orange"
style_root = "bg:color_orange fg:color_fg_orange"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg_aqua bg:color_aqua)]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[bun]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg_blue bg:color_blue)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
success_symbol = "[  ]( fg:color_green)"
error_symbol = "[  ]( fg:color_red)"
